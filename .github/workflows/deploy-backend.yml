name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore backend.Tests/backend.Tests.csproj

      - name: Build
        run: dotnet build backend.Tests/backend.Tests.csproj --no-restore

      - name: Run tests
        run: dotnet test backend.Tests/backend.Tests.csproj --no-build --verbosity normal

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry cinelasacr \
            --image cinelas-backend:${{ github.sha }} \
            ./backend

      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name cinelas-backend \
            --resource-group cinelas-rg \
            --image cinelasacr.azurecr.io/cinelas-backend:${{ github.sha }} \
            --set-env-vars \
              "TMDB__ApiKey=${{ secrets.TMDB_API_KEY }}" \
              "AzureOpenAI__Endpoint=${{ secrets.AZURE_OPENAI_ENDPOINT }}" \
              "AzureOpenAI__ApiKey=${{ secrets.AZURE_OPENAI_API_KEY }}" \
              "AzureOpenAI__EmbeddingDeployment=${{ secrets.AZURE_OPENAI_EMBEDDING_DEPLOYMENT }}" \
              "AzureOpenAI__ChatDeployment=${{ secrets.AZURE_OPENAI_CHAT_DEPLOYMENT }}" \
              "AzureOpenAI__Temperature=${{ secrets.AZURE_OPENAI_TEMPERATURE }}" \
              "AzureOpenAI__MaxTokens=${{ secrets.AZURE_OPENAI_MAX_TOKENS }}" \
              "AzureOpenAI__SystemPromptOverride=${{ secrets.AZURE_OPENAI_SYSTEM_PROMPT_OVERRIDE }}"
